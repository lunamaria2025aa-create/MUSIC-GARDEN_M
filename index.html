<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Garden 🌸</title>
    <style>
        :root {
            --bg-image: url('noche.png'); 
            --accent: #b39ddb;
            --card-bg: rgba(20, 10, 40, 0.7);
            --text-color: #ffffff;
        }

        .day-mode {
            --bg-image: url('dia.png');
            --accent: #7e57c2;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-color: #4a148c;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            transition: background-image 0.8s ease-in-out;
            position: relative;
        }

        /* Capa para mejorar visibilidad */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        .mode-toggle, .sound-grid { z-index: 10; }

        .mode-toggle {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(3, 160px);
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
        }

        .card.active {
            border-color: #fff;
            box-shadow: 0 0 20px var(--accent);
            transform: scale(1.05);
        }

        .icon { font-size: 40px; display: block; margin-bottom: 10px; }

        /* Animación de notas */
        .music-note {
            position: absolute;
            top: 5px; right: 10px;
            font-size: 20px;
            opacity: 0;
            pointer-events: none;
        }

        .active .music-note { animation: float 2s infinite; opacity: 1; }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        .vol-slider { width: 100%; margin-top: 10px; accent-color: var(--accent); }
    </style>
</head>
<body>

    <button class="mode-toggle" onclick="document.body.classList.toggle('day-mode')">☀️ / 🌙 Cambiar Ambiente</button>

    <div class="sound-grid">
        <div class="card" id="card-rain" onclick="toggleSound('rain')">
            <span class="music-note">♪</span><span class="icon">🏠</span><span>Lluvia</span>
            <input type="range" class="vol-slider" id="vol-rain" min="0" max="1" step="0.1" value="0.5" onclick="event.stopPropagation()">
        </div>

        <div class="card" id="card-birds" onclick="toggleSound('birds')">
            <span class="music-note">♫</span><span class="icon">🐦</span><span>Pajaritos</span>
            <input type="range" class="vol-slider" id="vol-birds" min="0" max="1" step="0.1" value="0.5" onclick="event.stopPropagation()">
        </div>

        <div class="card" id="card-wind" onclick="toggleSound('wind')">
            <span class="music-note">♬</span><span class="icon">🍃</span><span>Brisa</span>
            <input type="range" class="vol-slider" id="vol-wind" min="0" max="1" step="0.1" value="0.5" onclick="event.stopPropagation()">
        </div>

        <div class="card" id="card-bells" onclick="toggleSound('bells')">
            <span class="music-note">♩</span><span class="icon">🎐</span><span>Campanas</span>
            <input type="range" class="vol-slider" id="vol-bells" min="0" max="1" step="0.1" value="0.5" onclick="event.stopPropagation()">
        </div>

        <div class="card" id="card-crickets" onclick="toggleSound('crickets')">
            <span class="music-note">♪</span><span class="icon">🦗</span><span>Grillos</span>
            <input type="range" class="vol-slider" id="vol-crickets" min="0" max="1" step="0.1" value="0.5" onclick="event.stopPropagation()">
        </div>

        <div class="card" id="card-owls" onclick="toggleSound('owls')">
            <span class="music-note">♫</span><span class="icon">🦉</span><span>Búhos</span>
            <input type="range" class="vol-slider" id="vol-owls" min="0" max="1" step="0.1" value="0.5" onclick="event.stopPropagation()">
        </div>
    </div>

    <audio id="audio-rain" loop src="sounds/lluvia.mp3"></audio>
    <audio id="audio-birds" loop src="sounds/pajaritos.mp3"></audio>
    <audio id="audio-wind" loop src="sounds/brisa.mp3"></audio>
    <audio id="audio-bells" loop src="sounds/campanas.mp3"></audio>
    <audio id="audio-crickets" loop src="sounds/grillos.mp3"></audio>
    <audio id="audio-owls" loop src="sounds/buhos.mp3"></audio>

    <script>
        function toggleSound(id) {
            const audio = document.getElementById('audio-' + id);
            const card = document.getElementById('card-' + id);
            const slider = document.getElementById('vol-' + id);

            audio.volume = slider.value;

            if (audio.paused) {
                audio.play().then(() => {
                    card.classList.add('active');
                }).catch(e => console.error("Error al reproducir:", e));
            } else {
                audio.pause();
                card.classList.remove('active');
            }

            slider.oninput = (e) => {
                audio.volume = e.target.value;
            };
        }
    </script>
</body>
</html>
